<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');
      .brand-text { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 28px; fill: #0f172a; letter-spacing: 0.5px; }
      .accent-dot { fill: #4f46e5; }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Chat bubble icon -->
  <svg x="4" y="10" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2.5" filter="url(#glow)">
    <path stroke-linecap="round" stroke-linejoin="round"
      d="M8 12h.01M12 12h.01M16 12h.01
         M21 12c0 4.418-4.03 8-9 8
         a9.863 9.863 0 01-4.255-.949
         L3 20l1.395-3.72
         C3.512 15.042 3 13.574 3 12
         c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
  </svg>

  <!-- Brand name -->
  <text x="52" y="42" class="brand-text">Bztel <tspan class="accent-dot">.</tspan></text>
</svg>
